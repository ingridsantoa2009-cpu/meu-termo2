<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meu Termo</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#121213;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

h1{
margin-bottom:10px;
}

#timer{
font-size:22px;
margin-bottom:15px;
}

#board{
display:grid;
grid-template-columns:repeat(5,60px);
grid-gap:8px;
margin-bottom:25px;
}

.tile{
width:60px;
height:60px;
border:2px solid #3a3a3c;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
text-transform:uppercase;
}

.correct{
background:#6aaa64;
border:none;
}

.present{
background:#c9b458;
border:none;
}

.absent{
background:#3a3a3c;
border:none;
}

#keyboard{
display:flex;
flex-direction:column;
gap:8px;
}

.row{
display:flex;
justify-content:center;
gap:6px;
}

.key{
padding:12px 14px;
background:#818384;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
border-radius:4px;
}

.key.big{
background:#6aaa64;
}

#startScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#121213;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.instructions{
max-width:420px;
margin:20px;
font-size:18px;
line-height:1.6;
}

.startBtn{
background:white;
color:#f1c40f;
border:3px solid black;
font-size:24px;
padding:15px 30px;
cursor:pointer;
font-weight:bold;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.overlay h1{
font-size:50px;
}

.retry{
padding:15px 25px;
font-size:20px;
margin-top:20px;
cursor:pointer;
}

@media(max-width:600px){

#board{
grid-template-columns:repeat(5,50px);
}

.tile{
width:50px;
height:50px;
font-size:24px;
}

.key{
padding:10px;
font-size:14px;
}

}

</style>
</head>

<body>

<div id="startScreen">

<h1>Está preparada para o desafio?</h1>

<p class="instructions">
Esse termo é de alguém especial para alguém especial e ele agora tem tempo!<br><br>
Você terá <b>2 minutos</b> para acertar a palavra.<br>
Boa sorte!
</p>

<button class="startBtn" onclick="startGame()">START</button>

</div>

<h1>Meu Termo</h1>
<div id="timer">02:00</div>

<div id="board"></div>

<div id="keyboard">

<div class="row" id="row1"></div>
<div class="row" id="row2"></div>
<div class="row" id="row3"></div>

</div>

<div id="victory" class="overlay">
<h1>VOCÊ GANHOU 🎉</h1>
<button class="retry" onclick="location.reload()">Tentar novamente</button>
</div>

<div id="defeat" class="overlay">
<h1>VOCÊ PERDEU</h1>
<p>A palavra era: <span id="loseWord"></span></p>
<button class="retry" onclick="location.reload()">Tentar novamente</button>
</div>

<script>

let palavra="AMOR".toUpperCase()

let board=document.getElementById("board")

let grid=[]
let currentRow=0
let currentCol=0

let tempo=120
let timerInterval
let timerStarted=false

function startGame(){

document.getElementById("startScreen").style.display="none"

}

function startTimer(){

timerInterval=setInterval(updateTimer,1000)

}

function updateTimer(){

tempo--

let min=Math.floor(tempo/60)
let sec=tempo%60

if(sec<10) sec="0"+sec

document.getElementById("timer").innerText=min+":"+sec

if(tempo<=0){
clearInterval(timerInterval)
loseGame()
}

}

for(let r=0;r<6;r++){

let row=[]

for(let c=0;c<5;c++){

let tile=document.createElement("div")
tile.className="tile"

board.appendChild(tile)
row.push(tile)

}

grid.push(row)

}

function createKey(letter,row){

let key=document.createElement("button")
key.textContent=letter
key.className="key"

key.onclick=()=>pressKey(letter)

document.getElementById(row).appendChild(key)

}

function createBigKey(text,row,func){

let key=document.createElement("button")
key.textContent=text
key.className="key big"

key.onclick=func

document.getElementById(row).appendChild(key)

}

let row1="QWERTYUIOP"
let row2="ASDFGHJKL"
let row3="ZXCVBNM"

for(let l of row1) createKey(l,"row1")
for(let l of row2) createKey(l,"row2")

createBigKey("ENTER","row3",check)

for(let l of row3) createKey(l,"row3")

createBigKey("DEL","row3",delLetter)

function pressKey(letter){

if(currentCol<5){

if(!timerStarted){
startTimer()
timerStarted=true
}

grid[currentRow][currentCol].textContent=letter
currentCol++

}

}

function delLetter(){

if(currentCol>0){

currentCol--
grid[currentRow][currentCol].textContent=""

}

}

function check(){

if(currentCol<5) return

let tentativa=""

for(let i=0;i<5;i++){
tentativa+=grid[currentRow][i].textContent
}

for(let i=0;i<5;i++){

let tile=grid[currentRow][i]

if(tentativa[i]===palavra[i]){

tile.classList.add("correct")

}else if(palavra.includes(tentativa[i])){

tile.classList.add("present")

}else{

tile.classList.add("absent")

}

}

if(tentativa===palavra){

clearInterval(timerInterval)

document.getElementById("victory").style.display="flex"

confetti()

setTimeout(()=>{
let audio=new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_8f1c9d9f9f.mp3")
audio.play()
},200)

return
}

currentRow++
currentCol=0

if(currentRow===6){

clearInterval(timerInterval)

for(let i=0;i<5;i++){
grid[5][i].style.background="#ff4d4d"
}

loseGame()

}

}

function loseGame(){

document.getElementById("loseWord").innerText=palavra
document.getElementById("defeat").style.display="flex"

}

function confetti(){

for(let i=0;i<120;i++){

let conf=document.createElement("div")

conf.style.position="fixed"
conf.style.width="10px"
conf.style.height="10px"
conf.style.background="hsl("+Math.random()*360+"deg,100%,50%)"
conf.style.top="-10px"
conf.style.left=Math.random()*100+"%"
conf.style.opacity="0.9"

document.body.appendChild(conf)

let fall=setInterval(()=>{

let top=parseFloat(conf.style.top)

conf.style.top=top+5+"px"

if(top>window.innerHeight){

clearInterval(fall)
conf.remove()

}

},30)

}

}

</script>

</body>
</html>
