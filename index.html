<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meu Termo</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#121213;
color:white;
text-align:center;
}

/* START SCREEN */

#startScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#121213;
z-index:20;
}

#startScreen h1{
font-size:38px;
margin-bottom:30px;
}

.startBtn{
background:white;
color:black;
font-size:24px;
padding:15px 40px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* TIMER */

#timer{
font-size:26px;
margin-top:10px;
}

/* BOARD */

#board{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
width:90vw;
max-width:350px;
margin:25px auto;
}

.tile{
width:100%;
aspect-ratio:1;
border:2px solid #3a3a3c;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
text-transform:uppercase;
}

.correct{
background:#6aaa64;
border:none;
}

.present{
background:#c9b458;
border:none;
}

.absent{
background:#3a3a3c;
border:none;
}

.loseTile{
background:red !important;
border:none;
}

/* KEYBOARD */

#keyboard{
width:95vw;
max-width:500px;
margin:auto;
}

.keyrow{
display:flex;
justify-content:center;
margin-bottom:6px;
}

.key{
flex:1;
margin:2px;
padding:12px;
font-size:16px;
font-weight:bold;
background:#818384;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

.key.enter,.key.delete{
background:#6aaa64;
flex:1.5;
}

.key.wrong{
background:red;
}

/* WIN / LOSE */

#victoryScreen,#loseScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.victoryBox{
text-align:center;
padding:20px;
}

.victoryTitle{
font-size:60px;
color:#6aaa64;
}

.loseTitle{
font-size:60px;
color:red;
}

.retry{
background:#6aaa64;
border:none;
color:white;
font-size:22px;
padding:15px 35px;
border-radius:10px;
cursor:pointer;
}

#confetti{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>

</head>

<body>

<div id="startScreen">
<h1>Está preparada para o desafio?</h1>
<button class="startBtn" onclick="startGame()">START</button>
</div>

<h1>Meu Termo</h1>

<div id="timer">02:00</div>

<div id="board"></div>

<div id="keyboard">

<div class="keyrow">
<button class="key" onclick="press('Q')" id="keyQ">Q</button>
<button class="key" onclick="press('W')" id="keyW">W</button>
<button class="key" onclick="press('E')" id="keyE">E</button>
<button class="key" onclick="press('R')" id="keyR">R</button>
<button class="key" onclick="press('T')" id="keyT">T</button>
<button class="key" onclick="press('Y')" id="keyY">Y</button>
<button class="key" onclick="press('U')" id="keyU">U</button>
<button class="key" onclick="press('I')" id="keyI">I</button>
<button class="key" onclick="press('O')" id="keyO">O</button>
<button class="key" onclick="press('P')" id="keyP">P</button>
</div>

<div class="keyrow">
<button class="key" onclick="press('A')" id="keyA">A</button>
<button class="key" onclick="press('S')" id="keyS">S</button>
<button class="key" onclick="press('D')" id="keyD">D</button>
<button class="key" onclick="press('F')" id="keyF">F</button>
<button class="key" onclick="press('G')" id="keyG">G</button>
<button class="key" onclick="press('H')" id="keyH">H</button>
<button class="key" onclick="press('J')" id="keyJ">J</button>
<button class="key" onclick="press('K')" id="keyK">K</button>
<button class="key" onclick="press('L')" id="keyL">L</button>
</div>

<div class="keyrow">
<button class="key enter" onclick="check()">ENTER</button>
<button class="key" onclick="press('Z')" id="keyZ">Z</button>
<button class="key" onclick="press('X')" id="keyX">X</button>
<button class="key" onclick="press('C')" id="keyC">C</button>
<button class="key" onclick="press('V')" id="keyV">V</button>
<button class="key" onclick="press('B')" id="keyB">B</button>
<button class="key" onclick="press('N')" id="keyN">N</button>
<button class="key" onclick="press('M')" id="keyM">M</button>
<button class="key delete" onclick="del()">⌫</button>
</div>

</div>

<div id="victoryScreen">
<div class="victoryBox">
<h1 class="victoryTitle">🎉 VOCÊ GANHOU 🎉</h1>
<button onclick="restart()" class="retry">Jogar novamente</button>
</div>
</div>

<div id="loseScreen">
<div class="victoryBox">
<h1 class="loseTitle">❌ VOCÊ PERDEU ❌</h1>
<p>A palavra era: <span id="correctWord"></span></p>
<button onclick="restart()" class="retry">Tentar novamente</button>
</div>
</div>

<canvas id="confetti"></canvas>

<script>

let palavra="AMORZ"

let tentativaAtual=0
let tentativa=""
let maxTentativas=6

let tempo=120
let timerInterval

const board=document.getElementById("board")

for(let i=0;i<30;i++){
let tile=document.createElement("div")
tile.classList.add("tile")
board.appendChild(tile)
}

function startGame(){
document.getElementById("startScreen").style.display="none"
startTimer()
}

function startTimer(){

timerInterval=setInterval(function(){

tempo--

let minutos=Math.floor(tempo/60)
let segundos=tempo%60

if(segundos<10) segundos="0"+segundos

document.getElementById("timer").innerText=minutos+":"+segundos

if(tempo<=0){
clearInterval(timerInterval)
gameOverTime()
}

},1000)

}

function gameOverTime(){

document.getElementById("correctWord").textContent=palavra
document.getElementById("loseScreen").style.display="flex"

}

function press(letra){

if(tentativa.length<5){
tentativa+=letra
updateBoard()
}

}

function del(){

tentativa=tentativa.slice(0,-1)
updateBoard()

}

function updateBoard(){

for(let i=0;i<5;i++){

let tile=board.children[tentativaAtual*5+i]

tile.textContent=tentativa[i]||""

}

}

function check(){

if(tentativa.length!=5) return

for(let i=0;i<5;i++){

let tile=board.children[tentativaAtual*5+i]

if(tentativa[i]==palavra[i]){
tile.classList.add("correct")
}

else if(palavra.includes(tentativa[i])){
tile.classList.add("present")
}

else{
tile.classList.add("absent")
document.getElementById("key"+tentativa[i]).classList.add("wrong")
}

}

if(tentativa==palavra){

clearInterval(timerInterval)

document.getElementById("victoryScreen").style.display="flex"
startConfetti()
return
}

tentativaAtual++
tentativa=""

if(tentativaAtual==maxTentativas){

clearInterval(timerInterval)

for(let i=0;i<5;i++){
let tile=board.children[(tentativaAtual-1)*5+i]
tile.classList.add("loseTile")
}

document.getElementById("correctWord").textContent=palavra
document.getElementById("loseScreen").style.display="flex"

}

}

function restart(){
location.reload()
}

/* CONFETTI */

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<120;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*6+4,
speed:Math.random()*3+2
})
}

function startConfetti(){

setInterval(()=>{

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{

ctx.fillStyle="#6aaa64"
ctx.fillRect(p.x,p.y,p.size,p.size)

p.y+=p.speed

if(p.y>canvas.height){
p.y=0
}

})

},20)

}

</script>

</body>
</html>
