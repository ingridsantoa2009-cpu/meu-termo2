<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meu Termo</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#121213;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#board{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
width:90vw;
max-width:350px;
margin:30px auto;
}

.tile{
width:100%;
aspect-ratio:1;
border:2px solid #3a3a3c;
display:flex;
align-items:center;
justify-content:center;
font-size:clamp(22px,5vw,32px);
font-weight:bold;
text-transform:uppercase;
}

.correct{
background:#6aaa64;
border:none;
}

.present{
background:#c9b458;
border:none;
}

.absent{
background:#3a3a3c;
border:none;
}

.loseTile{
background:#ff4d4d !important;
border:none;
}

#keyboard{
width:95vw;
max-width:500px;
margin:auto;
}

.keyrow{
display:flex;
justify-content:center;
margin-bottom:6px;
}

.key{
flex:1;
margin:2px;
padding:12px;
font-size:clamp(12px,3vw,16px);
font-weight:bold;
background:white;
color:black;
border:none;
border-radius:4px;
cursor:pointer;
}

.key.enter{
background:#6aaa64;
color:white;
flex:1.5;
}

.key.delete{
background:#6aaa64;
color:white;
flex:1.5;
}

#victoryScreen,#loseScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.victoryBox{
text-align:center;
padding:20px;
}

.victoryTitle{
font-size:clamp(40px,8vw,70px);
color:#6aaa64;
}

.loseTitle{
font-size:clamp(40px,8vw,70px);
color:#ff4d4d;
}

.victoryText,.loseText{
font-size:clamp(18px,4vw,24px);
margin:20px 0;
}

.retry{
background:#6aaa64;
border:none;
color:white;
font-size:22px;
padding:15px 35px;
border-radius:10px;
cursor:pointer;
}

#confetti{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>

</head>

<body>

<h1>Meu Termo</h1>

<div id="board"></div>

<div id="keyboard">

<div class="keyrow">
<button class="key" onclick="press('Q')">Q</button>
<button class="key" onclick="press('W')">W</button>
<button class="key" onclick="press('E')">E</button>
<button class="key" onclick="press('R')">R</button>
<button class="key" onclick="press('T')">T</button>
<button class="key" onclick="press('Y')">Y</button>
<button class="key" onclick="press('U')">U</button>
<button class="key" onclick="press('I')">I</button>
<button class="key" onclick="press('O')">O</button>
<button class="key" onclick="press('P')">P</button>
</div>

<div class="keyrow">
<button class="key" onclick="press('A')">A</button>
<button class="key" onclick="press('S')">S</button>
<button class="key" onclick="press('D')">D</button>
<button class="key" onclick="press('F')">F</button>
<button class="key" onclick="press('G')">G</button>
<button class="key" onclick="press('H')">H</button>
<button class="key" onclick="press('J')">J</button>
<button class="key" onclick="press('K')">K</button>
<button class="key" onclick="press('L')">L</button>
</div>

<div class="keyrow">
<button class="key enter" onclick="check()">ENTER</button>
<button class="key" onclick="press('Z')">Z</button>
<button class="key" onclick="press('X')">X</button>
<button class="key" onclick="press('C')">C</button>
<button class="key" onclick="press('V')">V</button>
<button class="key" onclick="press('B')">B</button>
<button class="key" onclick="press('N')">N</button>
<button class="key" onclick="press('M')">M</button>
<button class="key delete" onclick="del()">⌫</button>
</div>

</div>

<div id="victoryScreen">
<div class="victoryBox">
<h1 class="victoryTitle">🎉 VOCÊ GANHOU 🎉</h1>
<p class="victoryText">Parabéns! Você descobriu a palavra.</p>
<button onclick="restart()" class="retry">Jogar novamente</button>
</div>
</div>

<div id="loseScreen">
<div class="victoryBox">
<h1 class="loseTitle">❌ VOCÊ PERDEU ❌</h1>
<p class="loseText">A palavra era: <span id="correctWord"></span></p>
<button onclick="restart()" class="retry">Tentar novamente</button>
</div>
</div>

<canvas id="confetti"></canvas>

<audio id="winSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2c6f0c2c62.mp3">
</audio>

<script>

let palavra="AMORZ"

let tentativaAtual=0
let tentativa=""
let maxTentativas=6

const board=document.getElementById("board")

for(let i=0;i<30;i++){
let tile=document.createElement("div")
tile.classList.add("tile")
board.appendChild(tile)
}

function press(letra){

if(tentativa.length<5){
tentativa+=letra
updateBoard()
}

}

function del(){

tentativa=tentativa.slice(0,-1)
updateBoard()

}

function updateBoard(){

for(let i=0;i<5;i++){

let tile=board.children[tentativaAtual*5+i]

tile.textContent=tentativa[i]||""

}

}

function check(){

if(tentativa.length!=5){
return
}

for(let i=0;i<5;i++){

let tile=board.children[tentativaAtual*5+i]

if(tentativa[i]==palavra[i]){
tile.classList.add("correct")
}

else if(palavra.includes(tentativa[i])){
tile.classList.add("present")
}

else{
tile.classList.add("absent")
}

}

if(tentativa==palavra){

document.getElementById("victoryScreen").style.display="flex"

setTimeout(()=>{
document.getElementById("winSound").play()
startConfetti()
},400)

return
}

tentativaAtual++
tentativa=""

if(tentativaAtual==maxTentativas){

for(let i=0;i<5;i++){

let tile=board.children[(tentativaAtual-1)*5+i]

tile.classList.add("loseTile")

}

document.getElementById("correctWord").textContent=palavra

document.getElementById("loseScreen").style.display="flex"

}

}

function restart(){

location.reload()

}

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<120;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*6+4,
speed:Math.random()*3+2
})
}

function startConfetti(){

setInterval(()=>{

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{

ctx.fillStyle="#6aaa64"
ctx.fillRect(p.x,p.y,p.size,p.size)

p.y+=p.speed

if(p.y>canvas.height){
p.y=0
}

})

},20)

}

</script>

</body>
</html>
